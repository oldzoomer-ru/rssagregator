spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/rssaggregator
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  web:
    error:
      include-message: always
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8081/realms/rssaggregator}
springdoc:
  swagger-ui:
    path: /api-docs.html
